<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{margin:0;padding:0;background:#050b1b;width:100%;overflow-x:hidden;}
 
@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
 
@keyframes ember-fall{
  0%{transform:translateY(-20px) translateX(0px) rotate(0deg);opacity:0;}
  5%{opacity:1;}
  50%{transform:translateY(50%) translateX(18px) rotate(180deg);opacity:0.8;}
  95%{opacity:0.5;}
  100%{transform:translateY(105%) translateX(-10px) rotate(360deg);opacity:0;}
}
@keyframes spark-fall{
  0%{transform:translateY(-20px) translateX(0px) rotate(0deg);opacity:0;}
  5%{opacity:0.9;}
  30%{transform:translateY(30%) translateX(-14px) rotate(120deg);opacity:0.85;}
  65%{transform:translateY(65%) translateX(12px) rotate(250deg);opacity:0.6;}
  95%{opacity:0.3;}
  100%{transform:translateY(105%) translateX(-8px) rotate(360deg);opacity:0;}
}
 
@keyframes orb-float{
  0%,100%{transform:translateY(0) scale(1);opacity:.18;}
  50%{transform:translateY(-18px) scale(1.1);opacity:.28;}
}
@keyframes border-pulse{
  0%,100%{border-color:rgba(180,110,20,.22);}
  50%{border-color:rgba(230,160,50,.45);}
}
@keyframes title-pulse{
  0%,100%{filter:drop-shadow(0 0 6px rgba(200,140,30,.35));}
  50%{filter:drop-shadow(0 0 20px rgba(255,190,60,.75));}
}
 
.at-wrap{
  position:relative;
  width:100%;
  max-width:100%;
  margin:0;
  padding:16px;
  background:linear-gradient(175deg,#050b18 0%,#0b1630 35%,#091224 65%,#101f3f 100%);
  border-radius:0;
  border:1px solid rgba(80,170,255,.28);
  color:#d7ebff;
  font-family:'Segoe UI',Arial,Helvetica,sans-serif;
  overflow:hidden;
  box-shadow:
    0 0 60px rgba(40,120,255,.16),
    inset 0 0 80px rgba(0,0,0,.55);
}
 
#at-stars-canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
  display:block;
}
 
.at-orb-1{width:90px;height:90px;background:rgba(80,170,255,.18);top:8%;left:-18%;animation:orb-float 7s ease-in-out infinite;}
.at-orb-2{width:70px;height:70px;background:rgba(60,130,255,.14);top:28%;right:-14%;animation:orb-float 9s ease-in-out infinite 2s;}
.at-orb-3{width:80px;height:80px;background:rgba(120,200,255,.12);top:58%;left:-12%;animation:orb-float 8s ease-in-out infinite 1s;}
.at-orb-4{width:60px;height:60px;background:rgba(90,160,255,.10);top:78%;right:-10%;animation:orb-float 10s ease-in-out infinite 3s;}
 
#at-particles{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden;width:100%;height:100%;}
.ember{position:absolute;top:-20px;pointer-events:none;animation:ember-fall linear infinite;will-change:transform;border-radius:50%;display:block;}
.spark{position:absolute;top:-20px;pointer-events:none;animation:spark-fall linear infinite;will-change:transform;display:block;line-height:1;}
 
.at-content{position:relative;z-index:2;}
 
.at-title{
  text-align:center;
  font-size:21px;
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:16px;
  background:linear-gradient(90deg,#7ecbff,#4fa6ff,#d6f4ff,#7ecbff);
  background-size:300% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 5s linear infinite,title-pulse 3s ease-in-out infinite;
}
 
.at-card{
  background:rgba(12,22,45,.72);
  border-radius:20px;
  padding:8px;
  margin-bottom:10px;
  border:1px solid rgba(80,170,255,.22);
  animation:border-pulse 5s ease-in-out infinite;
  position:relative;
  overflow:hidden;
}
.at-card::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,rgba(200,140,50,.06) 0%,transparent 60%);
  pointer-events:none;
}
 
.at-card:last-child{margin-bottom:0;}
 
.at-section-title{
  text-align:center;
  background:linear-gradient(135deg,#102040,#183a70);
  color:#7ecbff;
  font-weight:800;
  padding:7px 10px;
  border-radius:14px;
  margin-bottom:7px;
  font-size:12px;
  letter-spacing:.5px;
  border:1px solid rgba(80,170,255,.32);
  position:relative;
  overflow:hidden;
}
 
.at-section-title::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,220,100,.12),transparent);
  animation:shimmer 3s linear infinite;
}
 
.at-role-title{font-weight:700;font-size:11.5px;color:#7ecbff;margin-bottom:8px;text-align:center;letter-spacing:.3px;}
.at-leaders-row{display:flex;justify-content:center;gap:24px;margin-bottom:14px;}
.at-leaders-single{display:flex;justify-content:center;margin-bottom:14px;}
.at-leader{text-align:center;}
.at-leader span{font-size:10px;color:#d7ebff;display:block;margin-top:2px;}
.at-leader a img,.at-leader-img{
  width:50px;height:50px;border-radius:50%;
  border:2px solid rgba(210,150,50,.55);
  box-shadow:0 0 12px rgba(180,100,10,.35);
  display:block;margin:0 auto 5px;object-fit:cover;transition:.25s;
}

.at-leader a:hover img{
  border-color:rgba(255,252,248,.98);
  box-shadow:0 0 26px rgba(220,210,205,.85),0 0 48px rgba(200,185,185,.45);
  transform:scale(1.1);
}
 
.nm-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 10px;
  border-radius:14px;
  background:rgba(15,25,45,.55);
  border:1px solid rgba(80,170,255,.20);
  text-decoration:none;
  transition:.2s;
  margin-bottom:8px;
}
.nm-item:last-child{margin-bottom:0;}

.nm-item:hover{
  background:rgba(70,62,62,.75);
  border-color:rgba(220,210,205,.70);
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(0,0,0,.40),0 0 22px rgba(220,210,205,.25);
}
.nm-avatar{width:42px;height:42px;border-radius:50%;border:2px solid rgba(210,150,50,.60);box-shadow:0 0 10px rgba(180,100,10,.28);object-fit:cover;flex-shrink:0;transition:.25s;}
.nm-item:hover .nm-avatar{
  transform:scale(1.07);
  box-shadow:0 0 24px rgba(230,220,215,.80);
  border-color:rgba(255,252,248,.92);
}
.nm-info{display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden;}
.nm-name{font-size:11px;font-weight:700;color:#7ecbff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nm-meta{display:flex;align-items:center;margin-top:2px;font-size:9.5px;font-weight:700;gap:4px;}
.nm-rating{color:#8ed8ff;flex-shrink:0;}
.nm-joined{margin-left:auto;color:#6fa8d8;white-space:nowrap;flex-shrink:0;}
.nm-item:hover .nm-name{text-decoration:underline;}
 
.at-event-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;margin-bottom:9px;color:#c8a060;padding:0 2px;}
.at-event-row:last-of-type{margin-bottom:0;}
.at-view-btn{
  background:rgba(60,30,5,.70);color:#f5d878;
  padding:4px 12px;border-radius:10px;font-size:11.5px;
  border:1px solid rgba(180,120,20,.38);
  cursor:pointer;transition:.2s;display:inline-block;text-decoration:none;font-weight:700;
}

.at-view-btn:hover{
  background:rgba(70,62,62,.80);
  color:#fff8f4;
  box-shadow:0 3px 10px rgba(0,0,0,.35),0 0 14px rgba(230,210,205,.28);
  border-color:rgba(220,210,205,.65);
}

.at-scroll{
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:#3b7fd6 rgba(15,25,45,.5);
}

.at-music-gif{
  display:block;
  margin:0 auto 6px;
  border-radius:14px;
  width:100%;
  max-width:240px;
  border:1px solid rgba(90,180,255,.35);
  box-shadow:
    0 4px 18px rgba(0,0,0,.35),
    0 0 18px rgba(90,180,255,.18);
}

audio{
  width:100%;
  height:32px;
}

.at-deco{
  text-align:center;
  font-size:10px;
  color:rgba(140,190,255,.55);
  margin-top:10px;
  letter-spacing:1px;
}

.bg-music-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  justify-items:center;
  margin-top:8px;
}

.bg-track{
  width:125px;
  height:125px;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(90,180,255,.35);
  background:rgba(15,25,45,.55);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    inset 0 0 12px rgba(90,180,255,.08),
    0 0 12px rgba(90,180,255,.12);
  transition:.25s;
}

.bg-track:hover{
  transform:scale(1.03);
  border-color:rgba(140,220,255,.65);
  box-shadow:
    0 0 18px rgba(120,210,255,.28);
}

.bg-track iframe{
  width:125px;
  height:125px;
  display:block;
  border:none;
} 
  
</style>
</head>
<body>

  <script>
(function(){

var wrap=document.getElementById('at-wrap');
var canvas=document.getElementById('at-stars-canvas');

function resizeCanvas(){
  canvas.width=wrap.offsetWidth;
  canvas.height=wrap.scrollHeight;
}

resizeCanvas();

var ctx=canvas.getContext('2d');
var stars=[];

function initStars(){
  stars=[];
  for(var i=0;i<70;i++){
    var isBig=Math.random()<0.12;
    var isMedium=!isBig&&Math.random()<0.2;

    stars.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:isBig?(Math.random()*1.0+1.2):isMedium?(Math.random()*0.5+0.6):(Math.random()*0.4+0.2),
      base:Math.random()*0.20+0.06,
      amp:Math.random()*0.55+0.18,
      sp:Math.random()*0.8+0.25,
      ph:Math.random()*Math.PI*2,
      hue:28+Math.random()*27,
      cross:isBig,
      sparkle:isMedium&&Math.random()<0.4
    });
  }
}

initStars();

function drawStars(ts){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  var t=ts/1000;

  for(var s of stars){
    var a=Math.max(0,Math.min(1,s.base+s.amp*Math.sin(s.sp*t+s.ph)));

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle='hsla('+s.hue+',90%,85%,'+a+')';
    ctx.fill();

    if(s.cross){
      ctx.strokeStyle='hsla('+s.hue+',90%,85%,'+(a*0.5)+')';
      ctx.lineWidth=0.4;
      var arm=s.r*3.2;

      ctx.beginPath();
      ctx.moveTo(s.x-arm,s.y);
      ctx.lineTo(s.x+arm,s.y);
      ctx.moveTo(s.x,s.y-arm);
      ctx.lineTo(s.x,s.y+arm);
      ctx.stroke();
    }
  }

  requestAnimationFrame(drawStars);
}

requestAnimationFrame(drawStars);

new ResizeObserver(function(){
  resizeCanvas();
  initStars();
}).observe(wrap);

var container=document.getElementById('at-particles');

var emberColors=[
  {bg:'rgba(255,160,40,.90)',sh:'0 0 5px rgba(255,120,0,.9)'},
  {bg:'rgba(255,210,60,.80)',sh:'0 0 5px rgba(255,190,0,.8)'},
  {bg:'rgba(255,100,20,.75)',sh:'0 0 4px rgba(200,60,0,.7)'},
  {bg:'rgba(255,180,30,.70)',sh:'0 0 4px rgba(200,110,0,.6)'}
];

for(var i=0;i<12;i++){
  var c=emberColors[Math.floor(Math.random()*emberColors.length)];
  var el=document.createElement('span');

  el.className='ember';
  el.style.left=(Math.random()*100)+'%';
  el.style.width=(2+Math.random()*3)+'px';
  el.style.height=(2+Math.random()*3)+'px';
  el.style.background=c.bg;
  el.style.boxShadow=c.sh;
  el.style.animationDuration=(10+Math.random()*10)+'s';
  el.style.animationDelay=(Math.random()*8)+'s';

  container.appendChild(el);
}

var FALLBACK='https://www.chess.com/bundles/web/images/user-image.007dad08.svg';
var DP='https://taki2023.github.io/taki/default-pawn.png';

function loadPfp(username,ids){
  fetch('https://api.chess.com/pub/player/'+username.toLowerCase())
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){
      var src=d&&d.avatar?d.avatar:FALLBACK;
      ids.forEach(function(id){
        var el=document.getElementById(id);
        if(el)el.src=src;
      });
    })
    .catch(function(){
      ids.forEach(function(id){
        var el=document.getElementById(id);
        if(el)el.src=FALLBACK;
      });
    });
}

loadPfp('Ahmed-Ayeldeen610',['pfp-ahmed']);

function timeAgo(ts){
  var diff=Math.floor((Date.now()-ts*1000)/1000);

  if(diff<30)return'Just now';

  var m=Math.floor(diff/60);
  if(m<60)return m+'m ago';

  var h=Math.floor(m/60);
  if(h<24)return h+'h ago';

  var d=Math.floor(h/24);
  if(d<7)return d+'d ago';

  return Math.floor(d/7)+'w ago';
}

async function loadNewest(){
  try{
    var r=await fetch('https://api.chess.com/pub/club/blue-gemstone/members');
    var d=await r.json();

    var members=[...(d.weekly||[]),...(d.monthly||[]),...(d.all_time||[])];
    var seen=new Map();

    members.forEach(function(m){
      if(!m||!m.username||!m.joined)return;
      seen.set(m.username,m);
    });

    var top=Array.from(seen.values())
      .sort(function(a,b){return b.joined-a.joined;})
      .slice(0,3);

    var results=await Promise.all(top.map(async function(m){
      var pj=null,stats=null;

      try{
        var base='https://api.chess.com/pub/player/'+m.username;

        var res=await Promise.all([
          fetch(base).then(function(r){ return r.ok ? r.json() : null; }),
          fetch(base+'/stats').then(function(r){ return r.ok ? r.json() : null; })
        ]);

        pj=res[0];
        stats=res[1];
      }catch(e){}

      var rating=
        stats?.chess_rapid?.last?.rating ||
        stats?.chess_blitz?.last?.rating ||
        stats?.chess_bullet?.last?.rating ||
        '—';

      return{
        username:m.username,
        avatar:(pj&&pj.avatar)?pj.avatar:FALLBACK,
        rating:rating,
        joined:m.joined
      };
    }));

    document.getElementById('nm-list').innerHTML=results.map(function(m){
      return '<a class="nm-item" href="https://www.chess.com/member/'+m.username+'" target="_blank">'
      +'<img class="nm-avatar" src="'+m.avatar+'" onerror="this.src=\''+DP+'\'">'
      +'<div class="nm-info">'
      +'<div class="nm-name">@'+m.username+'</div>'
      +'<div class="nm-meta">'
      +'<span class="nm-rating">'+m.rating+'</span>'
      +'<span class="nm-joined">'+timeAgo(m.joined)+'</span>'
      +'</div></div></a>';
    }).join('');

  }catch(e){
    document.getElementById('nm-list').innerHTML=
      '<div style="text-align:center;color:#9a6e28;">Unable to load members.</div>';
  }
}

loadNewest();

})();
</script>
